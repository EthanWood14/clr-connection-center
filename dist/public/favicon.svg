<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 70 58" width="70" height="58">
  <style>
    .dark-icon  { display: block; }
    .light-icon { display: none; }
    @media (prefers-color-scheme: dark) {
      .dark-icon  { display: none; }
      .light-icon { display: block; }
    }
  </style>
  <image class="dark-icon"  width="70" height="58" href="data:image/png;base64," />
  <image class="light-icon" width="70" height="58" href="data:image/png;base64," />
</svg>